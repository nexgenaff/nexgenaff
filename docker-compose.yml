version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nextgen_db_pro
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nextgen_affiliates_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  app:
    build: .
    container_name: nextgen_app_pro
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/nextgen_affiliates_pro
      - NODE_ENV=production
      - JWT_SECRET=your-super-secret-jwt-key-change-this
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge